<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Celestial Chess</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <link
      href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
      rel="stylesheet"
    />
    <link rel="icon" href="/static/favicon.png" type="image/png" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="dynamic-background"></div>
    <button id="openConfig" class="config-toggle-btn" type="button">配置</button>
    <nav>
      <ul class="menus">
        <li class="menu_item">
          <i class="fa fa-th-large" aria-hidden="true"></i>

          <ul>
            <li id="undoButton">悔棋</li>
            <li id="redoButton">重悔</li>
            <li id="restartButton">重开</li>
          </ul>
        </li>
        <li class="menu_item">
          <i class="fa fa-check-square" aria-hidden="true"></i>

          <ul>
            <li id="minimaxButton">Minimax执棋</li>
            <li id="mctsButton">MCTS执棋</li>
            <li id="monkyButton">Monky执棋</li>
            <!-- <li id="dlButton">DLAI执棋</li> -->
          </ul>
        </li>
        <li class="menu_item">
          <i class="fa fa-comment" aria-hidden="true"></i>

          <ul>
            <li id="minimaxAuto">与Minimax对弈</li>
            <li id="mctsAuto">与MCTS对弈</li>
            <li id="monkyAuto">与Monky对弈</li>
            <!-- <li id="dlAuto">与DLAI对弈</li> -->
          </ul>
        </li>
        <li class="menu_item">
          <i class="fa fa-tags" aria-hidden="true"></i>

          <ul>
            <li id="toggleCmd">显示/隐藏 CMD</li>
          </ul>
        </li>
        <li class="menu_item">
          <i class="fa fa-bars" aria-hidden="true"></i>

          <ul>
            <li>Score: <span id="Score">0</span></li>
          </ul>
        </li>
      </ul>
    </nav>
    <div class="main">
      <h1 style="text-align: center">
        <span id="celestial">Celestial</span> Chess
      </h1>
      <table id="chessboard"></table>
    </div>
    <div id="configOverlay" class="config-overlay">
      <div class="config-panel">
        <div class="config-panel-header">
          <div class="config-panel-title">配置中心</div>
          <button id="closeConfig" class="config-close-btn" type="button">关闭</button>
        </div>
        <div class="config-section">
          <div class="config-title config-title-center">棋盘配置</div>
          <div class="config-row">
            <label for="configRowLen">行</label>
            <input id="configRowLen" type="number" min="3" step="1" />
            <label for="configColLen">列</label>
            <input id="configColLen" type="number" min="3" step="1" />
            <label for="configPower">Power</label>
            <input id="configPower" type="number" min="2" step="1" />
          </div>
          <div class="config-row config-actions">
            <button id="applyConfig" type="button">应用</button>
          </div>
        </div>
        <div class="config-section">
          <div class="config-title config-title-center">显示配置</div>
          <div class="config-row">
            <label for="displayMode">数字模式</label>
            <select id="displayMode">
              <option value="all">万象 (all)</option>
              <option value="no-zero" selected>归一 (no-zero)</option>
              <option value="none">无为 (none)</option>
            </select>
          </div>
        </div>
        <div class="config-section">
          <div class="config-title config-title-center">观战配置</div>
          <div class="spectator-layout">
            <div class="spectator-left">
              <div class="config-row">
                <label for="spectatorSleep">等待(s)</label>
                <input id="spectatorSleep" type="number" min="0" step="0.1" value="0" />
              </div>
              <div class="ai-config">
                <div class="ai-config-title">蓝方 AI</div>
                <div class="config-row">
                  <select id="spectatorBlueType">
                    <option value="minimax">Minimax</option>
                    <option value="mcts" selected>MCTS</option>
                    <option value="monky">Monky</option>
                  </select>
                  <input id="spectatorBlueDepth" type="number" min="1" step="1" value="2" />
                  <input id="spectatorBlueMcts" type="number" min="10" step="10" value="1000" />
                </div>
              </div>
              <div class="ai-config">
                <div class="ai-config-title">红方 AI</div>
                <div class="config-row">
                  <select id="spectatorRedType">
                    <option value="minimax">Minimax</option>
                    <option value="mcts" selected>MCTS</option>
                    <option value="monky">Monky</option>
                  </select>
                  <input id="spectatorRedDepth" type="number" min="1" step="1" value="2" />
                  <input id="spectatorRedMcts" type="number" min="10" step="10" value="1000" />
                </div>
              </div>
            </div>
            <div class="spectator-right">
              <div class="spectator-status" id="spectatorStatus">对弈模式</div>
              <div class="config-actions">
                <button id="startSpectator" type="button" class="config-primary-btn">开始观战</button>
                <button id="stopSpectator" type="button" class="config-primary-btn">停止观战</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="cmd-panel" class="cmd-panel" style="display: none;">
      <div id="cmd-header" class="cmd-header">
        <div class="cmd-dots">
          <button id="cmd-close" class="cmd-dot cmd-dot-close" type="button"></button>
          <button id="cmd-minimize" class="cmd-dot cmd-dot-min" type="button"></button>
          <button id="cmd-maximize" class="cmd-dot cmd-dot-max" type="button"></button>
        </div>
        <div class="cmd-title">Terminal</div>
      </div>
      <div id="cmd-output" class="cmd-output"></div>
      <div class="cmd-input-row">
        <span class="cmd-input-prefix">&gt;</span>
        <input id="cmd-input" class="cmd-input" type="text" />
      </div>
    </div>

    <script src="/static/custom_select.js"></script>
    <script src="/static/script.js"></script>
  </body>
</html>
